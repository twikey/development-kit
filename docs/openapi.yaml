    /payment/link:
        post:
            tags:
                - Paymentlinks
            summary: Create paymentlink
            description: >
                Create a payment link for an affiliated customer (via email)
                or via a name (in which case no customer is linked).
                Supports Idempotency-Key header to prevent duplicate link creation.
            operationId: postPaymentLink
            requestBody:
                content:
                    application/x-www-form-urlencoded:
                        schema:
                            type: object
                            required:
                                - title
                                - amount
                            properties:
                                customerNumber:
                                    type: string
                                    maxLength: 50
                                    description: Customer identifier (strongly advised)
                                email:
                                    type: string
                                    maxLength: 70
                                    description: Email of the customer
                                lastname:
                                    type: string
                                    maxLength: 50
                                    description: Customer last name
                                firstname:
                                    type: string
                                    maxLength: 50
                                    description: Customer first name
                                companyName:
                                    type: string
                                    maxLength: 140
                                    description: Business name
                                coc:
                                    type: string
                                    maxLength: 50
                                    description: Enterprise number
                                l:
                                    type: string
                                    maxLength: 5
                                    description: Language code (en, nl, nl_nl, fr, fr_fr, de, it, pt, es)
                                mobile:
                                    type: string
                                    maxLength: 50
                                    description: Mobile phone number
                                ct:
                                    type: string
                                    description: Contract template
                                title:
                                    type: string
                                    maxLength: 140
                                    description: Message visible on bank statement (required)
                                remittance:
                                    type: string
                                    description: Payment reference (aliased as ref). Defaults to title if empty
                                amount:
                                    type: string
                                    description: Amount to be billed
                                redirectUrl:
                                    type: string
                                    description: Post-payment redirect (requires http:// or https://)
                                place:
                                    type: string
                                    description: Optional location field
                                expiry:
                                    type: string
                                    description: Expiration date (UTC timestamp supported by some PSPs)
                                sendInvite:
                                    type: string
                                    description: Send out invite directly
                                    enum:
                                        - email
                                        - SMS
                                        - registeredEmail
                                address:
                                    type: string
                                    maxLength: 70
                                    description: Street and number
                                city:
                                    type: string
                                    maxLength: 50
                                    description: City name
                                zip:
                                    type: string
                                    maxLength: 12
                                    description: Postal code
                                country:
                                    type: string
                                    maxLength: 2
                                    description: ISO 2-letter country code (eg. BE/NL/FR)
                                txref:
                                    type: string
                                    description: Reference from unpaid transactions (consolidates multiple)
                                method:
                                    type: string
                                    description: Payment method (bypass PSP selection)
                                    enum:
                                        - bancontact
                                        - ideal
                                        - maestro
                                        - mastercard
                                        - visa
                                        - inghomepay
                                        - kbc
                                        - belfius
                                        - paypal
                                        - googlepay
                                        - applepay
                                        - banktrans
                                invoice:
                                    type: string
                                    description: Invoice number for invoice-specific links
                                isTemplate:
                                    type: boolean
                                    description: Redirects to custom payment form when true
            security:
                -   AuthorizationToken: []
            parameters:
                - name: Idempotency-Key
                  in: header
                  description: Unique key to prevent duplicate link creation
                  required: false
                  schema:
                      type: string
                - name: X-Purpose
                  in: header
                  description: 'Alters URL for specific use cases: qr (scannable by bank apps) or redirect (branded URL, default)'
                  required: false
                  schema:
                      type: string
                      enum:
                          - qr
                          - redirect
            responses:
                '200':
                    description: The request has succeeded
                    content:
                        application/json:
                            example:
                                id: 1
                                amount: 55.66
                                msg: "Test"
                                url: '{{host}}/payment/tr_l2iKz0LT8HvRrmf0'
                '400':
                    description: Invalid parameter
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    code:
                                        type: string
                                    message:
                                        type: string
                            examples:
                                err_invalid_amount:
                                    value:
                                        code: err_invalid_amount
                                        message: Invalid amount provided
                                err_invalid_date:
                                    value:
                                        code: err_invalid_date
                                        message: Invalid expiry date
                                err_duplicate_tx:
                                    value:
                                        code: err_duplicate_tx
                                        message: Duplicate transaction
                                err_not_found:
                                    value:
                                        code: err_not_found
                                        message: Invoice not found or amount exceeded
                                err_invalid_state:
                                    value:
                                        code: err_invalid_state
                                        message: Invoice not booked or expired
                                err_invalid_email:
                                    value:
                                        code: err_invalid_email
                                        message: Malformed email
                                err_invalid_name:
                                    value:
                                        code: err_invalid_name
                                        message: Invalid name provided
                                err_msg_missing:
                                    value:
                                        code: err_msg_missing
                                        message: Title required
                                err_no_integration:
                                    value:
                                        code: err_no_integration
                                        message: Payment gateway not configured
        get:
            tags:
                - Paymentlinks
                - RateLimited
            summary: Status paymentlink
            description: Get status of a payment link. At least one of id or ref must be provided.
            operationId: getPaymentLink
            security:
                -   AuthorizationToken: []
            parameters:
                - name: id
                  in: query
                  description: Id of the created link
                  schema:
                      type: string
                - name: ref
                  in: query
                  description: Your reference
                  schema:
                      type: string
                - name: include
                  in: query
                  description: Additional data to include in the response
                  schema:
                      type: string
                      enum:
                          - meta
                          - refunds
            responses:
                '200':
                    description: The request has succeeded
                    headers:
                        X-Rate-Limit-Remaining:
                            $ref: '#/components/headers/X-Rate-Limit-Remaining'
                    content:
                        application/json:
                            example:
                                Links:
                                    - id: 1
                                      amount: 55.66
                                      msg: "Test"
                                      ref: "Your ref"
                                      state: "One of created,started,declined,paid,pending,expired"
                '400':
                    description: Invalid parameter
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    code:
                                        type: string
                                    message:
                                        type: string
                            examples:
                                err_missing_params:
                                    value:
                                        code: err_missing_params
                                        message: No parameters supplied
                                err_no_transaction:
                                    value:
                                        code: err_no_transaction
                                        message: Link not found by transaction
                                err_not_found:
                                    value:
                                        code: err_not_found
                                        message: Link not found
                '429':
                    description: Rate limit exceeded
                    headers:
                        X-Rate-Limit-Retry-After-Seconds:
                            $ref: '#/components/headers/X-Rate-Limit-Retry-After-Seconds'
        delete:
            tags:
                - Paymentlinks
            summary: Remove paymentlink
            description: 'Only links with ''created'' status can be removed; others are archived'
            operationId: deletePaymentLink
            security:
                -   AuthorizationToken: []
            parameters:
                - name: id
                  in: query
                  description: Link identifier
                  required: true
                  schema:
                      type: string
            responses:
                '200':
                    description: Successful response
                    content:
                        application/json: {}
