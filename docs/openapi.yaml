openapi: 3.0.0
servers:
    - url: '{baseUrl}'
      description: Your Twikey API base URL
      variables:
          baseUrl:
              default: 'https://api.beta.twikey.com/creditor'
              description: 'Copy your base URL from the Twikey dashboard (e.g. https://yourcompany.twikey.com/api/creditor)'
info:
    title: 'Twikey API kit'
    description: |
        
        Version: 1.0.3

        ## General use

        Twikey has put in place a number of services enabling software partners,
        companies with own ERP or CRM systems, banks and other 3rd parties to
        exchange information. This page describes the different calls that are
        available to you. The calls allow integrating Twikey in a number of different ways.

        All exchanges require a valid AuthorizationToken passed as a header named
        "Authorization". The AuthorizationToken can be retrieved via the login call
        and is valid for 24h. 

        Since there are numerous ways a company can allow its customers to pay, you can fall back on the following resources for guidance:
        * [Core concepts](https://www.twikey.com/developers/usage-guidelines.html)
        * [Guides](https://www.twikey.com/developers/api-flows.html)
        * [Sample use case](https://www.twikey.com/developers/use-cases.html)
        * [API reference](https://www.twikey.com/api)
        * [Testing](https://www.twikey.com/developers/test.html)



    version: 1.0.3
    termsOfService: 'https://twikey.com/tc.html'
    contact:
        email: support@twikey.com
        name: Twikey Support
    license:
        name: Apache 2.0
        url: 'http://www.apache.org/licenses/LICENSE-2.0.html'
tags:
    - name: Authentication
    - name: Mandate
      description: Mandate related endpoints
    - name: Subscriptions
    - name: Transactions
      description: Transaction related endpoints
    - name: Collections
      description: Collection related endpoints
    - name: Invoices
    - name: Reconciliation
    - name: Paymentlinks
    - name: Credit Transfer
      description: Credit Transfer related endpoints
    - name: Issuers
    - name: Customers
    - name: Other
    - name: Identification
      description: Identity related endpoints
    - name: RateLimited
      description: >
        As we have a far better alternative to querying a single object (feed),
        sometimes it's necessary to fetch info about a particular item. To ensure
        these are one-offs and that you don't implement something that won't scale,
        we added rate limits to those requests.
components:
    headers:
        X-Rate-Limit-Remaining:
            description: The number of requests remaining for each minute
            schema:
                type: integer
                example: 55
        X-Rate-Limit-Retry-After-Seconds:
            description: Returned once the rate limit is reached. Time (in seconds) before a new request can be made
            schema:
                type: integer
                example: 30
    securitySchemes:
        AuthorizationToken:
            description: >
                Session token obtained from the Login endpoint (POST /).
                First call Login with your apiToken to receive an AuthorizationToken,
                then paste that token here. The token is valid for 24 hours.
                Do NOT put your API key here — use the session token returned by Login.
            type: apiKey
            in: header
            name: Authorization
    schemas:
        MandateResponse:
            type: object
            properties:
                GrpHdr:
                    $ref: '#/components/schemas/GrpHdr'
                Messages:
                    type: array
                    items:
                        $ref: '#/components/schemas/Mandate'
        GrpHdr:
            type: object
            properties:
                CreDtTm:
                    type: string
        SplmtryData:
            type: object
            properties:
                key:
                    type: string
                value:
                    type: object
        Mandate:
            type: object
            properties:
                EvtTime:
                    type: string
                Mndt:
                    type: object
                    properties:
                        MndtId:
                            type: string
                        LclInstrm:
                            type: string
                        MaxAmt:
                            type: number
                        Ocrncs:
                            type: number
                        CdtrSchmeId:
                            type: string
                        RfrdDoc:
                            type: string
                        SplmtryData:
                            type: array
                            items:
                                $ref: '#/components/schemas/SplmtryData'
                        Cdtr:
                            type: object
                            properties:
                                CtctDtls:
                                    type: object
                                    properties:
                                        EmailAdr:
                                            type: string
                                CtryOfRes:
                                    type: string
                                Id:
                                    type: string
                                Nm:
                                    type: string
                                PstlAdr:
                                    type: object
                                    properties:
                                        AdrLine:
                                            type: string
                                        Ctry:
                                            type: string
                                        PstCd:
                                            type: string
                                        TwnNm:
                                            type: string
                        Dbtr:
                            type: object
                            properties:
                                CtctDtls:
                                    type: object
                                    properties:
                                        EmailAdr:
                                            type: string
                                CtryOfRes:
                                    type: string
                                Id:
                                    type: string
                                Nm:
                                    type: string
                                PstlAdr:
                                    type: object
                                    properties:
                                        AdrLine:
                                            type: string
                                        Ctry:
                                            type: string
                                        PstCd:
                                            type: string
                                        TwnNm:
                                            type: string
                        DbtrAcct:
                            type: string
                        DbtrAgt:
                            type: object
                            properties:
                                FinInstnId:
                                    type: object
                                    properties:
                                        BICFI:
                                            type: string
                                        Nm:
                                            type: string
paths:
    /:
        post:
            tags:
                - Authentication
            summary: Login
            description: >
                Requires an **API Token** which can be found in the Twikey Creditor Dashboard under Settings -> API.

                When using the API the login call will provide you with an AuthorizationToken, which is to be send upon every subsequent call (via the authorization header) in order to use the api.
                This AuthorizationToken acts as a session token and has a validity of 24h.

                If you opted for enhanced security, the private key allows the generation of a Time-based One-time password.
                See Appendix C of the Creditor API documentation for a more detailed explanation or sample code on how to calculate this OTP (samples in various languages are available).
            operationId: postCreditor
            requestBody:
                content:
                    application/x-www-form-urlencoded:
                        schema:
                            type: object
                            required:
                                - apiToken
                            properties:
                                apiToken:
                                    type: string
                                    description: ERP API Token
                                    example: '{{api_key}}'
                                otp:
                                    type: integer
                                    format: int64
                                    description: Value calculated based on salt and private key (if enhanced security)
            responses:
                '200':
                    description: >
                        For security reasons, the http status is always 200, however for returning error codes specific to the call
                        2 additional response headers were added "ApiError" and "ApiErrorCode" which are added on every response that contains errors.
                        Notable exceptions are authentication errors and authorisation errors that don't have these 2 headers.
                    headers:
                        Authorization:
                            schema:
                                type: string
                                description: AuthorizationToken
                    content:
                        application/json:
                            schema:
                                type: object
                            example:
                                Authorization: "dabed12a-ae53-4ef0-be2c-17020d8e6d5a"
                '400':
                    description: >
                        Authentication failed. The ApiErrorCode header contains the error code.
                    headers:
                        ApiError:
                            schema:
                                type: string
                                description: Human-readable error message
                        ApiErrorCode:
                            schema:
                                type: string
                                description: Machine-readable error code
                                example: err_no_login
        get:
            tags:
                - Authentication
            summary: Logout
            description: Invalidates the AuthorizationToken by making a GET request to /creditor
            operationId: getCreditor
            security:
                -   AuthorizationToken: []
            responses:
                '204':
                    description: Logged out successfully, authorization token invalidated
    /invite:
        post:
            tags:
                - Mandate
            summary: Invite a customer
            description: >
                Necessary to start with an eMandate. The end-result is a signed or protected shortlink that will allow the end-customer to sign a mandate. The (short)link can be embedded in your website or in an email or in a paper letter. We advise to use the shortlink as the data is not exposed in the URL's.
            operationId: postCreditorPrepare
            requestBody:
                content:
                    application/x-www-form-urlencoded:
                        schema:
                            type: object
                            required:
                                - ct
                            properties:
                                ct:
                                    type: integer
                                    description: Contract template to use
                                    example: '{{ct}}'
                                l:
                                    type: string
                                    description: Language (en/fr/nl/de/pt/es/it)
                                iban:
                                    type: string
                                bic:
                                    type: string
                                mandateNumber:
                                    type: string
                                    description: Mandate Identification number (if not generated)
                                customerNumber:
                                    type: string
                                    maxLength: 50
                                    description: Customer identifier
                                email:
                                    type: string
                                lastname:
                                    type: string
                                firstname:
                                    type: string
                                mobile:
                                    type: string
                                    description: mobile number required for sms (International format +32499123445)
                                address:
                                    type: string
                                    description: Address (street + number)
                                city:
                                    type: string
                                zip:
                                    type: string
                                country:
                                    type: string
                                    description: ISO format (2 letters)
                                companyName:
                                    type: string
                                    description: the company name (if debtor is company)
                                vatno:
                                    type: string
                                    description: the enterprise number (if debtor is company)
                                contractNumber:
                                    type: string
                                    description: the contract number which can override the one defined in the template.
                                campaign:
                                    type: string
                                    description: Campaign to include this url in
                                prefix:
                                    type: string
                                    description: Optional prefix to use in the url (default companyname)
                                check:
                                    type: boolean
                                    description: If an existing mandate exists, don't prepare a new (based on email + template(=ct))
                                ed:
                                    type: number
                                    description: Link expiry (epoch ms, max 12 months)
                                reminderDays:
                                    type: number
                                    description: Send a reminder if contract was not signed after number of days
                                sendInvite:
                                    type: boolean
                                    description: Send out invite email directly
                                token:
                                    type: string
                                    description: Return token in exit URL
                                requireValidation:
                                    type: boolean
                                    description: Force registration page
                                document:
                                    type: string
                                transactionAmount:
                                    type: string
                                    description: Amount of the first payment on the mandate after it's signed
                                transactionMessage:
                                    type: string
                                    description: Payment description
                                transactionRef:
                                    type: string
                                    description: Payment reference
                                plan:
                                    type: string
                                    description: Subscription plan name
                                subscriptionStart:
                                    type: string
                                    format: date
                                    description: Start date (yyyy-mm-dd)
                                subscriptionRecurrence:
                                    type: string
                                    description: Interval (1w/1m/2m/3m/6m/12m)
                                subscriptionStopAfter:
                                    type: number
                                    description: Execution count
                                subscriptionAmount:
                                    type: number
                                    description: Per-transaction amount
                                subscriptionMessage:
                                    type: string
                                    description: Subscriber message
                                subscriptionRef:
                                    type: string
                                    description: Unique subscription ID
            security:
                -   AuthorizationToken: []
            responses:
                '200':
                    description: >
                        If the check option is provided and an existing mandate is available it will be returned.
                        Otherwise an url and key will be returned.
                    content:
                        application/json:
                            example:
                                url: "http://twikey.to/mycompany/xlBF"
                                key: "xlBF"
                                mndtId: "Comp71"
                '400':
                    description: >
                        User error, error code can be found in ApiError response header, translated value can be found in the body
    /sign:
        post:
            tags:
                - Mandate
            summary: Create and sign
            description: >
                Create a contract with an invitation/signature directly via API whilst skipping all Twikey screens. Note that this call can require different parameters depending on the method of signature.
                This endpoint also has business requirements tied to it. more info can be found [here](https://www.twikey.com/developers/api-flows.html#the-invite-vs-sign-endpoint)

            operationId: postCreditorSign
            requestBody:
                content:
                    application/x-www-form-urlencoded:
                        schema:
                            type: object
                            required:
                                - ct
                                - method
                            properties:
                                ct:
                                    type: integer
                                    description: Contract template to use
                                l:
                                    type: string
                                    description: Language (en/fr/nl/de/pt/es/it)
                                method:
                                    type: string
                                    description: >
                                        Method to sign. Possible values: bancontact, bcmc, ideal, sms, itsme,
                                        paper, import, digisign, emachtiging, idin, auto
                                    example: sms
                                mandateNumber:
                                    type: string
                                    description: Mandate Identification number (if not generated)
                                customerNumber:
                                    type: string
                                    maxLength: 50
                                    description: Customer identifier
                                iban:
                                    type: string
                                bic:
                                    type: string
                                email:
                                    type: string
                                lastname:
                                    type: string
                                firstname:
                                    type: string
                                mobile:
                                    type: string
                                    description: mobile number required for sms (International format +32499123445)
                                address:
                                    type: string
                                    description: Address (street + number)
                                city:
                                    type: string
                                zip:
                                    type: string
                                country:
                                    type: string
                                    description: ISO format (2 letters)
                                companyName:
                                    type: string
                                    description: the company name (if debtor is company)
                                vatno:
                                    type: string
                                    description: the enterprise number (if debtor is company)
                                contractNumber:
                                    type: string
                                    description: the contract number which can override the one defined in the template.
                                campaign:
                                    type: string
                                    maxLength: 250
                                    description: Campaign to include this mandate in
                                signDate:
                                    type: string
                                    description: 'Date of signature (xsd:dateTime / yyyy-mm-dd), sms uses date of reply'
                                place:
                                    type: string
                                    description: Place of signature
                                digsig:
                                    type: string
                                    description: Base64 encoded PNG signature (max 150KB)
                                key:
                                    type: string
                                    maxLength: 36
                                    description: Shortcode from invite URL
                                bankSignature:
                                    type: boolean
                                    description: B2B only; false requires bank validation
                                check:
                                    type: boolean
                                    description: Avoid duplicate if exists
                                document:
                                    type: string
                                    description: Contract in base64
            security:
                -   AuthorizationToken: []
            responses:
                '200':
                    description: The request has succeeded
                    content:
                        application/json:
                            example:
                                Msg: "OK"
                                MndtId: "MyMandateId"
                '400':
                    description: >
                        User error, error code can be found in ApiError response header, translated value can be found in the body
    /mandate:
        get:
            tags:
                - Mandate
            summary: Update Feed
            description: >
                Returns a List of all updated mandates (new, changed or cancelled) since the last call.

                From the moment there are changes (eg. a new contract/mandate or an update of an existing contract)
                this call provides all related information to the creditor. The service is initiated by the creditor
                and provides all MRI information (and extra metadata) to the creditor. This call can either be triggered by a callback
                once a change was made or periodically when no callback can be made.

                This information can serve multiple purposes:

                  * Updating a CRM system to take appropriate actions (eg. call the customer on cancel..)

                  * Integrate the info in an ERP system to create the correct SDD files (in case of mandates)

                In order to avoid polling, a hook can be setup to notify the client when new information is available.
                This hook can be configured in the settings -> API section.
            operationId: getCreditorMandate
            security:
                -   AuthorizationToken: []
            parameters:
                - name: include
                  in: query
                  description: >
                      Additional data to include in the response (repeatable). Possible values:
                      mandate, person, signature, plan, tracker, cancelled_mandate, paidamount, payment
                  required: false
                  schema:
                      type: string
                - name: X-RESUME-AFTER
                  in: header
                  description: Resume feed after specific sequence ID
                  required: false
                  schema:
                      type: string
                - name: X-TYPES
                  in: header
                  description: Contract types (default CORE,B2B,CREDITCARD)
                  required: false
                  schema:
                      type: string
            responses:
                '200':
                    description: The request has succeeded
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/MandateResponse'
                            example:
                                GrpHdr:
                                    CreDtTm: "2015-08-20T13:02:03Z"
                                Messages:
                                    - EvtTime: "2015-06-23T11:31:51Z"
                                      Mndt:
                                          Cdtr:
                                              CtctDtls:
                                                  EmailAdr: "info@creditor.com"
                                              CtryOfRes: "BE"
                                              Id: "BE0533800797"
                                              Nm: "Twikey N.V."
                                              PstlAdr:
                                                  AdrLine: "Veldstraat 11"
                                                  Ctry: "BE"
                                                  PstCd: "9000"
                                                  TwnNm: "Gent"
                                          CdtrSchmeId: "BE54ZZZ0533800797"
                                          Dbtr:
                                              CtctDtls:
                                                  EmailAdr: "admin@debtorcpy.be"
                                              CtryOfRes: "BE"
                                              Id: "BE123456789"
                                              Nm: "debtorCompany Inc."
                                              PstlAdr:
                                                  AdrLine: "Street 52"
                                                  Ctry: "BE"
                                                  PstCd: "1000"
                                                  TwnNm: "Brussels"
                                          DbtrAcct: "BE493104522"
                                          DbtrAgt:
                                              FinInstnId:
                                                  BICFI: "BBRUBEBB"
                                                  Nm: "ING BELGIUM NV/SA"
                                          LclInstrm: "CORE"
                                          MaxAmt: "0"
                                          MndtId: "1600650622"
                                          Ocrncs:
                                              Drtn:
                                                  FrDt: "2015-06-13"
                                              Frqcy: "ADHO"
                                              SeqTp: "RCUR"
                                          RfrdDoc: "1000"
                                          SplmtryData:
                                              - Key: "SignerPlace#0"
                                                Value: "Brussels"
                                              - Key: "SignerDate#0"
                                                Value: "2015-06-22T21:00:00Z"

        delete:
            tags:
                - Mandate
            summary: Cancel a mandate
            description: >
                A contract can be cancelled by either debtor or creditor, this can be
                done via the website or the api. However, there may be circumstances in
                which the creditor receives the cancel not through Twikey. In order to avoid extra costs & stale
                information, Twikey requires the update of its systems. The creditor, the
                creditor bank or the debtor bank, can initiate this
                request. Afterwards the update is distributed to all parties.
            operationId: deleteCreditorMandate
            security:
                -   AuthorizationToken: []
            parameters:
                - name: mndtId
                  in: query
                  description: Mandate Reference
                  required: true
                  schema:
                      type: string
                - name: rsn
                  in: query
                  description: Reason of cancellation
                  required: true
                  schema:
                      type: string
                - name: notify
                  in: query
                  description: Email customer notification
                  required: false
                  schema:
                      type: boolean
            responses:
                '200':
                    description: The request has succeeded
                '400':
                    description: >
                        User error, error code can be found in ApiError response header, translated value can be found in the body
                        eg.
                        * No contract was selected or invalid mndtId supplied
                        * Contract had wrong status (eg. already cancelled) or not authorised
                        * No contract was selected or mandate not found
                        * Please provide reason
    /mandate/detail:
        get:
            tags:
                - Mandate
                - RateLimited
            summary: Mandate Details
            description: Retrieve details of a specific mandate. (rate limited)
            operationId: getCreditorMandateDetails
            security:
                -   AuthorizationToken: []
            parameters:
                - name: mndtId
                  in: query
                  description: Mandate Reference
                  required: true
                  schema:
                      type: string
                - name: force
                  in: query
                  description: Also include non-signed states
                  required: false
                  schema:
                      type: boolean
            responses:
                '200':
                    description: Details of the mandate (see /mandate feed)
                    headers:
                        X-STATE:
                            schema:
                                type: string
                                description: Mandate state
                        X-COLLECTABLE:
                            schema:
                                type: boolean
                                description: Whether the mandate is collectable
                        X-Rate-Limit-Remaining:
                            $ref: '#/components/headers/X-Rate-Limit-Remaining'
                    content:
                        application/json: {}
                '400':
                    description: >
                        User error, error code can be found in ApiError response header, translated value can be found in the body
                '429':
                    description: Too many requests (rate limited)
                    headers:
                        X-Rate-Limit-Retry-After-Seconds:
                            $ref: '#/components/headers/X-Rate-Limit-Retry-After-Seconds'
    /mandate/update:
        post:
            tags:
                - Mandate
            summary: Update Mandate Details
            description: >
                Sometimes sending in the complete mandate is overkill and sending just
                the updated information is a lot easier by just passing the updated information. This endpoint allows to update
                account, address, email, phone information and plan.
            operationId: postCreditorMandateUpdate
            requestBody:
                content:
                    application/x-www-form-urlencoded:
                        schema:
                            type: object
                            required:
                                - mndtId
                            properties:
                                mndtId:
                                    type: string
                                    description: Mandate Reference
                                ct:
                                    type: number
                                    description: Move to different template (same type)
                                state:
                                    type: string
                                    description: Mandate state
                                    enum:
                                        - active
                                        - passive
                                iban:
                                    type: string
                                bic:
                                    type: string
                                firstname:
                                    type: string
                                    maxLength: 50
                                    description: First name
                                lastname:
                                    type: string
                                    maxLength: 50
                                    description: Last name
                                companyName:
                                    type: string
                                    maxLength: 140
                                    description: Company name
                                coc:
                                    type: string
                                    maxLength: 50
                                    description: Enterprise number (only if companyName changed)
                                l:
                                    type: string
                                    maxLength: 2
                                    description: Language
                                customerNumber:
                                    type: string
                                    maxLength: 50
                                    description: Customer identifier
                                address:
                                    type: string
                                    description: Street (street + number)
                                zip:
                                    type: string
                                city:
                                    type: string
                                country:
                                    type: string
                                    description: Country (ISO 2 letters)
                                mobile:
                                    type: string
                                    description: International format +32499123445
                                    example: '+32479123123'
                                email:
                                    type: string
            security:
                -   AuthorizationToken: []
            responses:
                '204':
                    description: The server has fulfilled the request but does not need to return an entity-body
                '400':
                    description: >
                        User error, error code can be found in ApiError response header, translated value can be found in the body
                        eg.
                        * No contract was selected or invalid mndtId supplied
                        * Mandates are editable only when in Prepared/Print state or CORE or not authorised
                        * No contract was selected or mandate not found
    /customeraccess:
        post:
            tags:
                - Mandate
            summary: Customer Access
            description: Allow debtor access to a specific mandate
            operationId: CustomerAccess
            requestBody:
                content:
                    application/x-www-form-urlencoded:
                        schema:
                            type: object
                            properties:
                                mndtId:
                                    type: string
                                    description: Mandate Reference
            security:
                -   AuthorizationToken: []
            responses:
                '200':
                    description: Link valid for 2min. allowing debtor access to the mandate
                    content:
                        application/json: {}
    /mandate/pdf:
        get:
            tags:
                - Mandate
                - RateLimited
            summary: Retrieve PDF
            description: Retrieve pdf of a mandate
            operationId: getCreditorMandatePdf
            security:
                -   AuthorizationToken: []
            parameters:
                - name: mndtId
                  in: query
                  description: Mandate Reference
                  required: true
                  schema:
                      type: string
            responses:
                '200':
                    description: PDF is available in the body of the response
                    headers:
                        X-Rate-Limit-Remaining:
                            $ref: '#/components/headers/X-Rate-Limit-Remaining'
                    content:
                        application/pdf: {}
                '429':
                    description: Too many requests (rate limited)
                    headers:
                        X-Rate-Limit-Retry-After-Seconds:
                            $ref: '#/components/headers/X-Rate-Limit-Retry-After-Seconds'
        post:
            tags:
                - Mandate
            summary: Upload PDF
            description: Import existing mandate pdf (eg. scan of a printed document)
            operationId: postCreditorMandatePdf
            requestBody:
                content:
                    application/pdf: {}
            security:
                -   AuthorizationToken: []
            parameters:
                - name: mndtId
                  in: query
                  description: Mandate Reference
                  required: true
                  schema:
                      type: string
                - name: bankSignature
                  in: query
                  description: B2B only; false skips bank validation offer
                  required: false
                  schema:
                      type: boolean
            responses:
                '200':
                    description: Import of the pdf was done
                    content:
                        application/json: {}
                '400':
                    description: >
                        User error, error code can be found in ApiError response header, translated value can be found in the body
    /legal:
        get:
            tags:
                - Mandate
            summary: Retrieve legal terms
            description: Retrieve legal terms
            operationId: getCreditorLegal
            security:
                -   AuthorizationToken: []
            parameters:
                - name: locale
                  in: query
