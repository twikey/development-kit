    /customer/{customerNumber}:
        patch:
            tags:
                - Customers
            summary: Update a customer
            description: Update a customer via this request. It is not possible to create a new customer or to merge customers using this request.
            security:
                -   AuthorizationToken: []
            parameters:
                - name: customerNumber
                  in: path
                  description: Current customer number (used in the URL path)
                  schema:
                      type: string
                      maxLength: 50
                  required: true
                - name: ct
                  in: query
                  description: Default template
                  required: false
                  schema:
                      type: integer
                      maximum: 9999
                - name: l
                  in: query
                  description: Language (en/fr/nl/de/pt/es/it)
                  required: false
                  schema:
                      type: string
                      maxLength: 2
                - name: customerNumber
                  in: query
                  description: Update the customer number
                  required: false
                  schema:
                      type: string
                      maxLength: 50
                - name: email
                  in: query
                  description: Email of the customer
                  required: false
                  schema:
                      type: string
                      maxLength: 70
                - name: lastname
                  in: query
                  description: Lastname of the customer
                  required: false
                  schema:
                      type: string
                      maxLength: 50
                - name: firstname
                  in: query
                  description: Firstname of the customer
                  required: false
                  schema:
                      type: string
                      maxLength: 50
                - name: mobile
                  in: query
                  description: Mobile number required for sms (International format 0032499123445)
                  required: false
                  schema:
                      type: string
                      maxLength: 50
                - name: address
                  in: query
                  description: Address (street + number)
                  required: false
                  schema:
                      type: string
                      maxLength: 70
                - name: city
                  in: query
                  description: City of customer
                  required: false
                  schema:
                      type: string
                      maxLength: 50
                - name: zip
                  in: query
                  description: Zipcode of customer
                  required: false
                  schema:
                      type: string
                      maxLength: 50
                - name: country
                  in: query
                  description: ISO format (2 letters)
                  required: false
                  schema:
                      type: string
                      maxLength: 2
                - name: companyName
                  in: query
                  description: The company name (if customer is company)
                  required: false
                  schema:
                      type: string
                      maxLength: 140
                - name: coc
                  in: query
                  description: The enterprise number. Only updated if the company name is also changed.
                  required: false
                  schema:
                      type: string
                      maxLength: 50
            responses:
                '204':
                    description: The request has succeeded
                '400':
                    description: The request contained invalid data
                    headers:
                        ApiError:
                            schema:
                                type: string
                                description: Human-readable error message
                        ApiErrorCode:
                            schema:
                                type: string
                                description: Machine-readable error code
