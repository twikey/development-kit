    /collect/query:
        get:
            tags:
                - Collections
                - RateLimited
            summary: Query collections
            description: Query collection batches. The response is limited to a set of 50 collections per page. This endpoint is rate-limited.
            operationId: getCreditorCollectQuery
            security:
                -   AuthorizationToken: []
            parameters:
                - name: state
                  in: query
                  description: 'Filter by state: sent, archived, cancelled'
                  required: false
                  schema:
                      type: string
                - name: generated
                  in: query
                  description: Batch creation date (YYYY-MM-DD)
                  required: false
                  schema:
                      type: string
                      format: date
                - name: reqcolldt
                  in: query
                  description: Requested collection date (YYYY-MM-DD)
                  required: false
                  schema:
                      type: string
                      format: date
                - name: ct
                  in: query
                  description: Profile ID
                  required: false
                  schema:
                      type: number
                - name: page
                  in: query
                  description: Pagination control
                  required: false
                  schema:
                      type: number
                - name: from
                  in: query
                  description: Collections created from (including) a precise local date (YYYY-MM-DD)
                  required: false
                  schema:
                      type: string
                      format: date
                - name: until
                  in: query
                  description: Collections created until (excluding) a precise local date (YYYY-MM-DD). Defaults to today.
                  required: false
                  schema:
                      type: string
                      format: date
            responses:
                '200':
                    description: Returns a list of collections matching the query criteria
                    headers:
                        X-Rate-Limit-Remaining:
                            $ref: '#/components/headers/X-Rate-Limit-Remaining'
                    content:
                        application/json: {}
                '400':
                    description: >
                        User error, error code can be found in ApiError response header, translated value can be found in the body.

                        Possible error codes:
                        * err_invalid_state - Invalid state value
                        * err_missing_params - Missing or incorrect parameter value
                '429':
                    description: Too many requests. This endpoint is rate-limited.
                    headers:
                        X-Rate-Limit-Retry-After-Seconds:
                            $ref: '#/components/headers/X-Rate-Limit-Retry-After-Seconds'

    /invoice:
        post:
            tags:
                - Invoices
            summary: New Invoice
            parameters:
                - name: X-Purpose
                  in: header
                  description: Alters URL format for use cases
                  required: false
                  schema:
                      type: string
                      enum:
                          - qr
                          - redirect
                      default: qr
                - name: X-Partner
                  in: header
                  description: Custom registration note (visible in interface)
                  required: false
                  schema:
                      type: string
                - name: X-Force-Transaction
                  in: header
                  description: Creates transaction even if mandate suspended/cancelled
                  required: false
                  schema:
                      type: boolean
            requestBody:
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                                - number
                                - amount
                                - date
                                - duedate
                            properties:
                                id:
                                    type: string
                                    description: UUID (optional)
                                    maxLength: 36
                                number:
                                    type: string
                                    description: Unique invoice identifier
                                    maxLength: 50
                                    example: '{{invoiceNumber}}'
                                title:
                                    type: string
                                    description: Message to debtor; auto-generated if empty
                                    maxLength: 140
                                    example: 'Invoice {{invoiceNumber}}'
                                remittance:
                                    type: string
                                    description: Payment message; uses title if empty
                                    maxLength: 140
                                    example: '123456789123'
                                ref:
                                    type: string
                                    description: Internal reference
                                ct:
                                    type: string
                                    description: Template ID
                                    maxLength: 4
                                amount:
                                    type: number
                                    description: Billing amount
                                    example: 100
                                date:
                                    type: string
                                    format: date
                                    description: Invoice date
                                    example: '{{invoiceDate}}'
                                duedate:
                                    type: string
                                    format: date
                                    description: Due date
                                    example: '{{dueDate}}'
                                paidamount:
                                    type: number
                                    description: Pre-payment amount
                                locale:
                                    type: string
                                    description: Language (en, nl, nl_nl, fr, fr_fr, de, it, pt, es)
                                customer:
                                    type: object
                                    description: Customer object (required if no customerByDocument/customerByRef)
                                    properties:
                                        customerNumber:
                                            type: string
                                            description: Customer number (either customerNumber or email required)
                                            maxLength: 50
                                        email:
                                            type: string
                                            description: Customer email (either customerNumber or email required)
                                            maxLength: 70
                                        firstname:
                                            type: string
                                            maxLength: 50
                                        lastname:
                                            type: string
                                            maxLength: 50
                                        companyName:
                                            type: string
                                            maxLength: 140
                                        coc:
                                            type: string
                                            maxLength: 50
                                        vatno:
                                            type: string
                                            maxLength: 50
                                        l:
                                            type: string
                                            description: Language code
                                            maxLength: 2
                                        address:
                                            type: string
                                            maxLength: 70
                                        city:
                                            type: string
                                            maxLength: 50
                                        zip:
                                            type: string
                                            maxLength: 50
                                        country:
                                            type: string
                                            description: ISO 3166-1 alpha-2 country code
                                            maxLength: 2
                                        mobile:
                                            type: string
                                            maxLength: 50
                                        peppol:
                                            type: string
                                            maxLength: 50
                                customerByDocument:
                                    type: string
                                    description: Mandate reference (e.g. MNDT123)
                                customerByRef:
                                    type: string
                                    description: Customer number reference
                                manual:
                                    type: boolean
                                    description: Skip auto-collection on creation
                                pdf:
                                    type: string
                                    description: Base64-encoded document
                                pdfUrl:
                                    type: string
                                    format: uri
                                    description: Direct PDF URL (use pdf OR pdfUrl, not both)
                                redirectUrl:
                                    type: string
                                    format: uri
                                    description: Post-payment redirect URL
                                email:
                                    type: string
                                    description: Alternative invoicing email
                                    maxLength: 70
                                relatedInvoiceNumber:
                                    type: string
                                    description: Link credit note to invoice
                                cc:
                                    type: string
                                    description: CC email addresses (comma-separated)
                                campaign:
                                    type: string
                                    description: Billing run assignment
            security:
                -   AuthorizationToken: []
            responses:
                '200':
                    description: Successful response
                    content:
                        application/json: {}
                '400':
                    description: Invalid parameter
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    code:
                                        type: string
                                        example: err_invalid_params
                                    message:
                                        type: string
        get:
            tags:
                - Invoices
            summary: Invoices Feed
            security:
                -   TwikeyToken: [ ]
            parameters:
                - name: include
                  in: query
                  description: Additional data to include
                  required: false
                  schema:
                      type: string
                      enum:
                          - meta
                          - customer
                          - lastpayment
                - name: invite_state
                  in: query
                  description: Filter by delivery status
                  required: false
                  schema:
                      type: string
                      enum:
                          - ok
                          - fail
                          - not_ok
            responses:
                '200':
                    description: Successful response
                    content:
                        application/json: {}
