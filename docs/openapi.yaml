                                colltndt:
                                    type: string
                                    description: Collection date (yyyy-mm-dd). Defaults to earliest possible batch date when omitted.
                                prenotify:
                                    type: boolean
                                    description: "Optional parameter, its existence will trigger the prenotification towards the debtor"
                                until:
                                    type: number
                                    description: Epoch in milliseconds; includes only transactions created before this timestamp
            security:
                -   AuthorizationToken: []
            responses:
                '200':
                    description: Returns the id referencing both first and recurring sdd send to bank. A batch was created and sent when at least the rcurMsgId or frstMsgId returns a value.
                    content:
                        application/json:
                            example:
                                frstMsgId: null
                                rcurMsgId: "123"
                '400':
                    description: >
                        User error, error code can be found in ApiError response header, translated value can be found in the body.

                        Possible error codes:
                        * err_no_such_ct - No template specified
                        * err_invalid_ct - Invalid template
                        * err_provide_account - No recurring gateway configured
                        * err_no_access_subscription - No bank connection in subscription
                        * err_invalid_date - Invalid date format
                        * err_invalid_params - Invalid request parameters
        get:
            tags:
                - Collections
                - RateLimited
            summary: Status collection
            description: Retrieve the status of a collection batch. This endpoint is rate-limited.
            security:
                -   AuthorizationToken: []
            parameters:
                - name: id
                  in: query
                  description: Specific SDD reference
                  required: false
                  schema:
                      type: number
                - name: pmtinfid
                  in: query
                  description: Specific Payment identifier
                  required: false
                  schema:
                      type: string
            responses:
                '200':
                    description: Returns SDD batch status with final flag indicating completion
                    headers:
                        X-Rate-Limit-Remaining:
                            $ref: '#/components/headers/X-Rate-Limit-Remaining'
                    content:
                        application/json:
                            example:
                                Sdds:
                                    - id: 1440095919005
                                      pmtinfid: "mypmtid"
                                      tx: 1
                                      amount: 198.22
                                      final: true
                '429':
                    description: >
                        Too many requests. This endpoint is rate-limited.

                        Possible error codes:
                        * err_call_in_progress - Request already in progress
                    headers:
                        X-Rate-Limit-Retry-After-Seconds:
                            $ref: '#/components/headers/X-Rate-Limit-Retry-After-Seconds'

