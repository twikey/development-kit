                                date:
                                    type: string
                                    format: date
                                    description: Date of the billable event or now when empty
                                reqcolldt:
                                    type: string
                                    format: date
                                    description: Requested collection date or null for ASAP
                                message:
                                    type: string
                                    maxLength: 140
                                    description: Message to the customer (appears on bank statement)
                                ref:
                                    type: string
                                    description: Your reference
                                amount:
                                    type: number
                                    description: Amount to be billed
                                place:
                                    type: string
                                    description: Optional place
                                refase2e:
                                    type: boolean
                                    description: Use reference as E2E identifier (EPC compliant)
            security:
                -   AuthorizationToken: []
            parameters:
                - name: Idempotency-Key
                  in: header
                  description: Unique key usable only once per request every 24hrs
                  required: false
                  schema:
                      type: string
                      maxLength: 64
            responses:
                '200':
                    description: The request has succeeded
                    content:
                        application/json:
                            example:
                                Entries:
                                    - id: 86860
                                      contractId: 52152
                                      mndtId: "TWIKEYCORE71"
                                      contract: "Contractnumber Twikey"
                                      amount: 10.0
                                      msg: "test"
                                      place: null
                                      reqcolldt: "2016-02-03"
                                      date: "2016-02-03T07:11:43Z"
                '400':
                    description: >
                        Invalid parameter. Error codes:
                        * `err_no_contract` - No mandate found
                        * `err_invalid_state` - Mandate not active
                        * `err_invalid_date` - Invalid date format
                        * `err_invalid_sepachars` - Invalid characters in message
                        * `err_invalid_amount` - Invalid amount
                        * `err_billing_overdrawn` - Maximum amount exceeded per risk rules
                        * `err_invalid_params` - Invalid parameter (see extra field)
                '409':
                    description: >
                        Idempotency-key already used. Error codes:
                        * `err_duplicate_ref` - Idempotency-key used within 24hrs
        get:
            tags:
                - Transactions
            summary: Transaction feed
            description: Retrieve feed of updated transactions.
            operationId: getCreditorTransactions
            security:
                -   AuthorizationToken: []
            parameters:
                - name: X-RESUME-AFTER
                  in: header
