                          - collection
                          - lastupdate
                          - action
                          - action_payment
                          - link
                          - stage
                          - seq
            responses:
                '200':
                    description: The request has succeeded
                    content:
                        application/json:
                            example:
                                Entries:
                                    - id: 123456789
                                      contractId: 10001
                                      mndtId: "mandateReference"
                                      contract: "contractNumber"
                                      amount: 99.99
                                      msg: "transaction message"
                                      place: "web"
                                      ref: null
                                      final: true
                                      state: "PAID"
                                      bkdate: "2017-03-21T08:13:21Z"
                                      reqcolldt: "2017-03-23T08:13:21Z"
                                    - id: 987654321
                                      contractId: 2002
                                      mndtId: "mandateReference"
                                      contract: "contractNumber"
                                      amount: 100
                                      msg: "transaction message"
                                      place: "web"
                                      ref: "INVOICE001"
                                      final: false
                                      state: "ERROR"
                                      bkerror: "MS03"
                                      bkmsg: "No reason specified"
                                      bkdate: "2016-09-21T08:13:21Z"
                                      reqcolldt: null
                                    - id: 56789123
                                      contractId: 3003
                                      mndtId: "mandateReference"
                                      contract: "contractNumber"
                                      amount: 49.99
                                      msg: "buy item X"
                                      place: "web"
                                      ref: null
                                      final: true
                                      state: "ERROR"
                                      bkerror: "AC04"
                                      bkmsg: "Account closed"
                                      bkdate: "2016-08-29T13:14:40Z"
                                      reqcolldt: null
                '400':
                    description: >
                        Error codes:
                        * `err_missing_params` - No parameter given
                        * `err_no_transaction` - No transaction found
                        * `err_not_found` - No link found
                        * `err_call_in_progress` - Another client request in progress
        put:
            tags:
                - Transactions
            summary: Update a transaction
            description: Update parameters for an existing transaction.
            operationId: updateTransaction
            requestBody:
                content:
                    application/x-www-form-urlencoded:
                        schema:
                            type: object
                            required:
                                - id
                            properties:
                                id:
                                    type: string
                                    description: Transaction id
                                reqcolldt:
                                    type: string
                                    description: Requested date of the billable event
                                message:
                                    type: string
                                    description: Message to the customer (if only 1 entry)
                                ref:
                                    type: string
                                    description: Your reference
                                amount:
                                    type: string
                                    description: Amount to be billed
                                place:
                                    type: string
                                    description: Optional place
            security:
                -   AuthorizationToken: []
            responses:
                '204':
                    description: The request has succeeded
                '400':
                    description: >
                        Invalid parameter. Error codes:
                        * `err_no_transaction` - Not found
                        * `err_no_contract` - Mandate not found/inactive
                        * `err_invalid_params` - Invalid parameter data
                        * `err_invalid_date` - Invalid date
                        * `err_invalid_amount` - Invalid amount
        delete:
            tags:
                - Transactions
            summary: Remove transaction
            description: Remove a transaction that wasn't collected yet
            operationId: deleteCreditorTransactions
            security:
                -   AuthorizationToken: []
            parameters:
                - name: id
                  in: query
                  description: a transactionId as returned in the post
                  required: false
                  schema:
                      type: string
                - name: ref
                  in: query
                  description: transactionReference as provided in the post to be removed
                  required: false
                  schema:
                      type: string
            responses:
                '204':
                    description: The request has succeeded
                '400':
                    description: >
                        Invalid parameter. Error codes:
                        * `err_no_contract` - Contract not found
                        * `err_not_found` - Transaction not found
                        * `err_transaction_invalid_action` - Action invalid for current state
                        * `err_duplicate_tx` - Multiple transactions with same reference
                        * `err_not_authorised` - Transaction already sent to bank
