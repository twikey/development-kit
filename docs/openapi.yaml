                                    - err_invalid_params
                                    - err_invalid_country
                                    - err_invalid_email
                                    - err_invalid_lang
                                    - err_debtor_not_found
                                    - err_duplicate_ref
    /ibanblacklist:
        post:
            tags:
                - Other
            summary: Blacklist account
            description: Add bank accounts to a blacklist when abuse or violations occur. Prevents new mandates and allows suspension or cancellation of existing ones.
            requestBody:
                content:
                    application/x-www-form-urlencoded:
                        schema:
                            type: object
                            required:
                                - iban
                                - rsn
                            properties:
                                iban:
                                    type: string
                                    description: Bank account to blacklist
                                rsn:
                                    type: string
                                    description: Reason for blacklisting
                                state:
                                    type: string
                                    description: Use "passive" to suspend or "cancel" to cancel mandates
                                notify:
                                    type: boolean
                                    description: Email customer notification
            security:
                -   AuthorizationToken: []
            responses:
                '200':
                    description: The request has succeeded
                    content:
                        application/json: {}
                '400':
                    description: The request contained invalid data
                    headers:
                        ApiError:
                            schema:
                                type: string
                                description: Human-readable error message
                        ApiErrorCode:
                            schema:
                                type: string
                                description: Machine-readable error code
                                enum:
                                    - err_provide_reason
                                    - err_invalid_params
        get:
            tags:
                - Other
            summary: List blacklisted accounts
            description: Retrieve all currently blacklisted bank accounts
            security:
                -   AuthorizationToken: []
            responses:
                '200':
                    description: The request has succeeded
                    content:
                        application/json: {}
        delete:
            tags:
                - Other
            summary: Remove blacklisted account
            description: Remove accounts from blacklist and optionally reactivate suspended mandates
            security:
                -   AuthorizationToken: []
            parameters:
                - name: iban
                  in: query
                  description: Account to remove from blacklist
                  required: true
                  schema:
                      type: string
                - name: state
                  in: query
                  description: Use "active" to reactivate suspended mandates
                  required: false
                  schema:
                      type: string
                - name: notify
                  in: query
                  description: Customer notification
                  required: false
                  schema:
                      type: boolean
            responses:
                '200':
                    description: The request has succeeded
                    content:
                        application/json: {}
                '400':
                    description: The request contained invalid data
                    headers:
                        ApiError:
                            schema:
                                type: string
                                description: Human-readable error message
                        ApiErrorCode:
                            schema:
                                type: string
                                description: Machine-readable error code
                                enum:
                                    - err_invalid_params
    /reporting:
        get:
            tags:
                - Other
            summary: Account reporting
            description: Returns payment items since the last call
            security:
                -   AuthorizationToken: []
            responses:
                '200':
                    description: The request has succeeded
                    content:
                        application/json: {}
    /ident:
        post:
            tags:
                - Identification
                - Other
            summary: Retrieve Identification url
            description: Generates bank identification links for customer verification via third-party services (iDIN for Netherlands, itsme for Belgium)
            operationId: identPrepare
            requestBody:
                content:
                    application/x-www-form-urlencoded:
                        schema:
                            type: object
                            required:
                                - ct
                                - bic
                                - method
                            properties:
                                ct:
                                    type: string
                                    description: Template with originating account
                                bic:
                                    type: string
                                    description: Bank BIC code (iDIN only)
                                method:
                                    type: string
                                    description: Identification method to use (itsme or idin)
                                l:
                                    type: string
                                    description: Language
            security:
                -   AuthorizationToken: []
            responses:
                '200':
                    description: Url to redirect to for authenticating the user
                    content:
                        application/json:
                            example:
                                url: "https://www.bank.nl/some_parameters"
                '400':
                    description: The request contained invalid data
                    headers:
                        ApiError:
                            schema:
                                type: string
                                description: Human-readable error message
                        ApiErrorCode:
                            schema:
                                type: string
                                description: Machine-readable error code
                                enum:
                                    - err_bank_t_o
                                    - err_idin_fail
    /reservation:
        post:
            tags:
                - Other
            summary: Transaction Reservation
            description: Validates transaction eligibility and returns reservation codes valid for 24 hours. Add header X-RESERVATION with the returned code when creating actual transactions.
            requestBody:
                content:
                    application/x-www-form-urlencoded:
                        schema:
                            type: object
                            required:
                                - reservation
                            properties:
                                mndtId:
                                    type: string
                                date:
                                    type: string
                                reqcolldt:
                                    type: string
                                message:
                                    type: string
                                ref:
                                    type: string
                                amount:
                                    type: string
                                place:
                                    type: string
                                reservation:
                                    type: boolean
                                    description: Indicates this is a reservation (must be true)
                                    example: 'true'
                                reservationMinimum:
                                    type: string
                                    description: >-
                                        Optional value, which if passed allows Twikey to reserve the
                                        highest amount lower than the amount but higher than this
                                        value
                                reservationExpiration:
                                    type: string
                                    description: >-
                                        Optional, Date after which this reservation automatically is
                                        voided (YYYY-MM-DDThh:mm:ssZ)
                                force:
                                    type: boolean
                                    description: Force a new reservation replacing an existing one
            security:
                -   AuthorizationToken: []
            responses:
                '200':
                    description: The request has succeeded
                    content:
                        application/json: {}
                '400':
                    description: The request contained invalid data
                    headers:
                        ApiError:
                            schema:
                                type: string
                                description: Human-readable error message
                        ApiErrorCode:
                            schema:
                                type: string
                                description: Machine-readable error code
                                enum:
                                    - err_billing_overdrawn
                                    - err_no_contract
                                    - err_invalid_state
                                    - err_invalid_date
                                    - err_invalid_sepachars
                                    - err_invalid_amount
                                    - err_not_authorised
        delete:
            tags:
                - Other
            summary: Delete Reservation
            description: Remove a reservation. Alternative is to create a new reservation with force=true parameter.
            security:
                -   AuthorizationToken: []
            parameters:
                - name: X-RESERVATION
                  in: header
                  schema:
                      type: string
                  example: '{{reservation id}}'
            responses:
                '204':
                    description: The request has succeeded
                '400':
                    description: The request contained invalid data
                    headers:
                        ApiError:
                            schema:
                                type: string
                                description: Human-readable error message
                        ApiErrorCode:
                            schema:
                                type: string
                                description: Machine-readable error code
                                enum:
                                    - err_not_found
    /ibancheck:
        post:
            tags:
                - Other
            summary: IBAN Name Check
            description: Verifies account details against bank records. Supports Netherlands and Italy.
            requestBody:
                content:
                    application/x-www-form-urlencoded:
                        schema:
                            type: object
                            properties:
                                name:
                                    type: string
                                    description: Account holder name
                                    maxLength: 70
                                iban:
                                    type: string
                                    description: IBAN to verify
                                    maxLength: 34
                                flavour:
                                    type: string
                                    description: Country variant for the check
                                    maxLength: 2
                                    enum:
                                        - nl
                                        - it
                                codfis:
                                    type: string
                                    description: Fiscal code (Italy only)
                                vatno:
                                    type: string
                                    description: VAT number (Italy only, takes precedence over codfis)
            security:
                -   AuthorizationToken: []
            responses:
                '200':
                    description: The request has succeeded
                    content:
                        application/json: {}
                '400':
                    description: The request contained invalid data
                    headers:
                        ApiError:
                            schema:
                                type: string
                                description: Human-readable error message
                        ApiErrorCode:
                            schema:
                                type: string
                                description: Machine-readable error code
                                enum:
                                    - err_no_integration
                                    - err_invalid_name
                                    - err_invalid_iban
                                    - err_fail_integration
                                    - err_missing_attributes
