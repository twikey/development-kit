components:
    securitySchemes:
        TwikeyToken:
            description: You receive the AuthorizationToken by logging in via the login endpoint
            type: apiKey
            in: header
            name: Authorization
paths:
    /:
        post:
            tags:
                - Login
            summary: Login
            requestBody:
                content:
                    application/x-www-form-urlencoded:
                        schema:
                            type: object
                            properties:
                                apiToken:
                                    type: string
                                    example: '{{api_key}}'
                                otp:
                                    type: string
            parameters:
                - name: Content-Type
                  in: header
                  schema:
                      type: string
                  example: application/x-www-form-urlencoded
            responses:
                '200':
                    description: Successful response
                    headers:
                        Authorization:
                            schema:
                                type: string
                                description: AuthorizationToken
                    content:
                        application/json:
                            schema:
                                type: object
                            example:
                                Authorization: "dabed12a-ae53-4ef0-be2c-17020d8e6d5a"
        get:
            tags:
                - Logout
            summary: Logout
            description: Logout
            security:
                -   TwikeyToken: []
            responses:
                '200':
                    description: Successful response
                    content:
                        application/json: {}
    /invite:
        post:
            tags:
                - Mandate
            summary: Invite a customer
            requestBody:
                content:
                    application/x-www-form-urlencoded:
                        schema:
                            type: object
                            properties:
                                ct:
                                    type: integer
                                    example: '{{ct}}'
                                l:
                                    type: string
                                iban:
                                    type: string
                                bic:
                                    type: string
                                mandateNumber:
                                    type: string
                                email:
                                    type: string
                                lastname:
                                    type: string
                                firstname:
                                    type: string
                                mobile:
                                    type: string
                                address:
                                    type: string
                                city:
                                    type: string
                                zip:
                                    type: string
                                country:
                                    type: string
                                companyName:
                                    type: string
                                vatno:
                                    type: string
                                form:
                                    type: string
                                contractNumber:
                                    type: string
                                campaign:
                                    type: string
                                prefix:
                                    type: string
                                check:
                                    type: string
                                reminderDays:
                                    type: string
                                sendInvite:
                                    type: string
                                document:
                                    type: string
            security:
                -   TwikeyToken: []
            parameters:
                - name: Content-Type
                  in: header
                  schema:
                      type: string
                  example: application/x-www-form-urlencoded
            responses:
                '200':
                    description: Successful response
                    content:
                        application/json: {}
    /sign:
        post:
            tags:
                - Mandate
            summary: Sign a mandate
            requestBody:
                content:
                    application/x-www-form-urlencoded:
                        schema:
                            type: object
                            properties:
                                ct:
                                    type: integer
                                l:
                                    type: string
                                method:
                                    type: string
                                    example: sms
                                mandateNumber:
                                    type: string
                                iban:
                                    type: string
                                bic:
                                    type: string
                                email:
                                    type: string
                                lastname:
                                    type: string
                                firstname:
                                    type: string
                                mobile:
                                    type: string
                                address:
                                    type: string
                                city:
                                    type: string
                                zip:
                                    type: string
                                country:
                                    type: string
                                companyName:
                                    type: string
                                vatno:
                                    type: string
                                form:
                                    type: string
                                contractNumber:
                                    type: string
                                signDate:
                                    type: string
                                place:
                                    type: string
            security:
                -   TwikeyToken: []
            parameters:
                - name: Content-Type
                  in: header
                  schema:
                      type: string
                  example: application/x-www-form-urlencoded
            responses:
                '200':
                    description: Successful response
                    content:
                        application/json: {}
    /mandate:
        get:
            tags:
                - Mandate
            summary: Update Feed
            security:
                -   TwikeyToken: []
            parameters:
                - name: Content-Type
                  in: header
                  schema:
                      type: string
                  example: application/x-www-form-urlencoded
            responses:
                '200':
                    description: Successful response
                    content:
                        application/json: {}
        delete:
            tags:
                - Mandate
            summary: Cancel a mandate
            security:
                -   TwikeyToken: []
            parameters:
                - name: Content-Type
                  in: header
                  schema:
                      type: string
                  example: application/x-www-form-urlencoded
            responses:
                '200':
                    description: Successful response
                    content:
                        application/json: {}
    /mandate/detail:
        get:
            tags:
                - Mandate
            summary: Get Mandate Details
            description: Get Mandate Details
            security:
                -   TwikeyToken: []
            parameters:
                - name: Content-Type
                  in: header
                  schema:
                      type: string
                  example: application/x-www-form-urlencoded
            responses:
                '200':
                    description: Successful response
                    content:
                        application/json: {}
    /mandate/update:
        post:
            tags:
                - Mandate
            summary: Update Mandate Details
            description: Get Mandate Details
            requestBody:
                content:
                    application/x-www-form-urlencoded:
                        schema:
                            type: object
                            properties:
                                mndtId:
                                    type: string
                                mobile:
                                    type: number
                                    example: '+32479123123'
            security:
                -   TwikeyToken: []
            parameters:
                - name: Content-Type
                  in: header
                  schema:
                      type: string
                  example: application/x-www-form-urlencoded
            responses:
                '200':
                    description: Successful response
                    content:
                        application/json: {}
    /customeraccess:
        post:
            tags:
                - Mandate
            summary: Customer Access
            requestBody:
                content:
                    application/x-www-form-urlencoded:
                        schema:
                            type: object
                            properties:
                                mndtId:
                                    type: string
            security:
                -   TwikeyToken: []
            parameters:
                - name: Content-Type
                  in: header
                  schema:
                      type: string
                  example: application/x-www-form-urlencoded
            responses:
                '200':
                    description: Successful response
                    content:
                        application/json: {}
    /mandate/pdf:
        get:
            tags:
                - Mandate
            summary: Retrieve PDF
            security:
                -   TwikeyToken: []
            parameters:
                - name: Content-Type
                  in: header
                  schema:
                      type: string
                  example: application/x-www-form-urlencoded
            responses:
                '200':
                    description: Successful response
                    content:
                        application/json: {}
        post:
            tags:
                - Mandate
            summary: Upload PDF
            requestBody:
                content:
                    text/plain: {}
            security:
                -   TwikeyToken: []
            parameters:
                - name: Content-Type
                  in: header
                  schema:
                      type: string
                  example: application/octet-stream
            responses:
                '200':
                    description: Successful response
                    content:
                        application/json: {}
    /legal:
        get:
            tags:
                - Mandate
            summary: Retrieve legal terms
            security:
                -   TwikeyToken: []
            parameters:
                - name: Content-Type
                  in: header
                  schema:
                      type: string
                  example: application/x-www-form-urlencoded
            responses:
                '200':
                    description: Successful response
                    content:
                        application/json: {}
    /subscription/query:
        get:
            tags:
                - Subscriptions
            summary: Query subscriptions
            security:
                -   TwikeyToken: []
            parameters:
                - name: Content-Type
                  in: header
                  schema:
                      type: string
                  example: application/x-www-form-urlencoded
            responses:
                '200':
                    description: Successful response
                    content:
                        application/json: {}
    /subscription/{ref}:
        get:
            tags:
                - Subscriptions
            summary: Subscription detail
            security:
                -   TwikeyToken: []
            parameters:
                - name: Content-Type
                  in: header
                  schema:
                      type: string
                  example: application/x-www-form-urlencoded
                - name: ref
                  in: path
                  schema:
                      type: string
                  required: true
            responses:
                '200':
                    description: Successful response
                    content:
                        application/json: {}
        post:
            tags:
                - Subscriptions
            summary: Update subscription
            requestBody:
                content:
                    application/x-www-form-urlencoded:
                        schema:
                            type: object
                            properties:
                                mndtId:
                                    type: string
                                    description: Mandate to use
                                message:
                                    type: string
                                    description: Message to the subscriber
                                plan:
                                    type: string
                                    description: Base plan to use
                                ref:
                                    type: string
                                    description: Reference of the subscription (important for updates)
                                amount:
                                    type: string
                                    description: Amount of the transaction
            security:
                -   TwikeyToken: []
            parameters:
                - name: Content-Type
                  in: header
                  schema:
                      type: string
                  example: application/x-www-form-urlencoded
                - name: ref
                  in: path
                  schema:
                      type: string
                  required: true
            responses:
                '200':
                    description: Successful response
                    content:
                        application/json: {}
        delete:
            tags:
                - Subscriptions
            summary: Delete subscription
            security:
                -   TwikeyToken: []
            parameters:
                - name: Content-Type
                  in: header
                  schema:
                      type: string
                  example: application/x-www-form-urlencoded
                - name: ref
                  in: path
                  schema:
                      type: string
                  required: true
            responses:
                '200':
                    description: Successful response
                    content:
                        application/json: {}
    /subscription:
        post:
            tags:
                - Subscriptions
            summary: Add subscription
            requestBody:
                content:
                    application/x-www-form-urlencoded:
                        schema:
                            type: object
                            properties:
                                mndtId:
                                    type: string
                                    description: Mandate to use
                                message:
                                    type: string
                                    description: Message to the subscriber
                                plan:
                                    type: string
                                    description: Base plan to use
                                ref:
                                    type: string
                                    description: Reference of the subscription (important for updates)
                                amount:
                                    type: string
                                    description: Amount of the transaction
                                stopAfter:
                                    type: string
                                    description: Number of times to execute
                                day:
                                    type: string
                                    description: Day of week/month to execute
                                recurrence:
                                    type: string
                                    description: 1w / 1m / 2m / 3m / 6m /12m (default 1m)
                                start:
                                    type: string
                                    description: Optional start of subscription eg. 2022-11-01
            security:
                -   TwikeyToken: []
            parameters:
                - name: Content-Type
                  in: header
                  schema:
                      type: string
                  example: application/x-www-form-urlencoded
            responses:
                '200':
                    description: Successful response
                    content:
                        application/json: {}
    /transaction:
        post:
            tags:
                - Transactions
            summary: New transaction
            requestBody:
                content:
                    application/x-www-form-urlencoded:
                        schema:
                            type: object
                            properties:
                                mndtId:
                                    type: string
                                date:
                                    type: string
                                reqcolldt:
                                    type: string
                                message:
                                    type: string
                                ref:
                                    type: string
                                amount:
                                    type: string
                                place:
                                    type: string
                                refase2e:
                                    type: string
                                    description: >-
                                        The reference is used as E2E identifier for the first
                                        payment
            security:
                -   TwikeyToken: []
            parameters:
                - name: Content-Type
                  in: header
                  schema:
                      type: string
                  example: application/x-www-form-urlencoded
            responses:
                '200':
                    description: Successful response
                    content:
                        application/json: {}
        get:
            tags:
                - Transactions
            summary: Transaction feed
            security:
                -   TwikeyToken: []
            responses:
                '200':
                    description: Successful response
                    content:
                        application/json: {}
        put:
            tags:
                - Transactions
            summary: Update a transaction
            requestBody:
                content:
                    application/x-www-form-urlencoded:
                        schema:
                            type: object
                            properties:
                                id:
                                    type: string
                                reqcolldt:
                                    type: string
                                message:
                                    type: string
                                ref:
                                    type: string
                                amount:
                                    type: string
                                place:
                                    type: string
            security:
                -   TwikeyToken: []
            parameters:
                - name: Content-Type
                  in: header
                  schema:
                      type: string
                  example: application/x-www-form-urlencoded
            responses:
                '200':
                    description: Successful response
                    content:
                        application/json: {}
        delete:
            tags:
                - Transactions
            summary: Remove transaction
            security:
                -   TwikeyToken: []
            parameters:
                - name: Content-Type
                  in: header
                  schema:
                      type: string
                  example: application/x-www-form-urlencoded
            responses:
                '200':
                    description: Successful response
                    content:
                        application/json: {}
    /transaction/detail:
        get:
            tags:
                - Transactions
            summary: Transaction status
            security:
                -   TwikeyToken: []
            parameters:
                - name: id
                  in: query
                  schema:
                      type: string
            responses:
                '200':
                    description: Successful response
                    content:
                        application/json: {}
    /transaction/action:
        post:
            tags:
                - Transactions
            summary: Action on a transaction
            requestBody:
                content:
                    application/x-www-form-urlencoded:
                        schema:
                            type: object
                            properties:
                                id:
                                    type: string
                                action:
                                    type: string
                                    example: reoffer
            security:
                -   TwikeyToken: []
            parameters:
                - name: Content-Type
                  in: header
                  schema:
                      type: string
                  example: application/x-www-form-urlencoded
            responses:
                '200':
                    description: Successful response
                    content:
                        application/json: {}
    /collect:
        post:
            tags:
                - Collections
            summary: Execute collection
            requestBody:
                content:
                    application/x-www-form-urlencoded:
                        schema:
                            type: object
                            properties:
                                ct:
                                    type: integer
                                colltndt:
                                    type: string
                                mndtId:
                                    type: string
                                prenotify:
                                    type: string
            security:
                -   TwikeyToken: []
            parameters:
                - name: Content-Type
                  in: header
                  schema:
                      type: string
                  example: application/x-www-form-urlencoded
            responses:
                '200':
                    description: Successful response
                    content:
                        application/json: {}
        get:
            tags:
                - Collections
            summary: Status collection
            security:
                -   TwikeyToken: []
            parameters:
                - name: id
                  in: query
                  schema:
                      type: string
                - name: pmtinfid
                  in: query
                  schema:
                      type: string
            responses:
                '200':
                    description: Successful response
                    content:
                        application/json: {}
    /invoice:
        post:
            tags:
                - Invoices
            summary: New Invoice
            requestBody:
                content:
                    application/json:
                        schema:
                            type: object
                            example:
                                number: '{{invoiceNumber}}'
                                title: Invoice {{invoiceNumber}}
                                remittance: '123456789123'
                                ct: 1
                                amount: 100
                                date: '{{invoiceDate}}'
                                duedate: '{{dueDate}}'
                                customer:
                                    email: api-{{$randomInt}}@twikey.com
                                    firstName: '{{$randomFirstName}}'
                                    lastName: '{{$randomLastName}}'
                                    address: Derbystraat 43
                                    city: Gent
                                    zip: '9000'
                                    country: BE
                                    l: nl
                                    mobile: '32498665995'
                                pdf: 'base64 of the invoice'
            security:
                -   TwikeyToken: []
            responses:
                '200':
                    description: Successful response
                    content:
                        application/json: {}
        get:
            tags:
                - Invoices
            summary: Invoices Feed
            security:
                -   TwikeyToken: [ ]
            responses:
                '200':
                    description: Successful response
                    content:
                        application/json: {}
    /invoice/{idOrNumber}:
        get:
            tags:
                - Invoices
            summary: Invoice Details
            security:
                -   TwikeyToken: []
            parameters:
                - name: idOrNumber
                  in: path
                  schema:
                      type: string
                  required: true
            responses:
                '200':
                    description: Successful response
                    content:
                        application/json: {}
    /invoice/{id}:
        put:
            tags:
                - Invoices
            summary: Update Invoice
            requestBody:
                content:
                    application/json:
                        schema:
                            type: object
                            example:
                                title: Invoice Updated
                                date: '{{invoiceDate}}'
                                duedate: '{{dueDate}}'
                                pdf: 'base64 of the invoice'
            security:
                -   TwikeyToken: []
            parameters:
                - name: id
                  in: path
                  schema:
                      type: string
                  required: true
            responses:
                '200':
                    description: Successful response
                    content:
                        application/json: {}
    /files:
        post:
            tags:
                - Reconciliation
            summary: Reconciliation Generate
            requestBody:
                content:
                    application/x-www-form-urlencoded:
                        schema:
                            type: object
                            properties:
                                sdd:
                                    type: boolean
                                    example: 'true'
                                format:
                                    type: string
                                    example: camt
            security:
                -   TwikeyToken: []
            parameters:
                - name: Content-Type
                  in: header
                  schema:
                      type: string
                  example: application/x-www-form-urlencoded
            responses:
                '200':
                    description: Successful response
                    content:
                        application/json: {}
        get:
            tags:
                - Reconciliation
            summary: Reconciliation List Files
            security:
                -   TwikeyToken: []
            parameters:
                - name: Content-Type
                  in: header
                  schema:
                      type: string
                  example: application/x-www-form-urlencoded
            responses:
                '200':
                    description: Successful response
                    content:
                        application/json: {}
    /files/{file}:
        get:
            tags:
                - Reconciliation
            summary: Reconciliation Files Download
            security:
                -   TwikeyToken: []
            parameters:
                - name: Content-Type
                  in: header
                  schema:
                      type: string
                  example: application/x-www-form-urlencoded
                - name: file
                  in: path
                  schema:
                      type: string
                  required: true
            responses:
                '200':
                    description: Successful response
                    content:
                        application/json: {}
    /payment/link:
        post:
            tags:
                - Paymentlinks
            summary: Create paymentlink
            requestBody:
                content:
                    application/x-www-form-urlencoded:
                        schema:
                            type: object
                            properties:
                                email:
                                    type: string
                                lastname:
                                    type: string
                                firstname:
                                    type: string
                                message:
                                    type: string
                                ref:
                                    type: string
                                amount:
                                    type: string
                                redirectUrl:
                                    type: string
                                place:
                                    type: string
                                expiry:
                                    type: string
                                sendInvite:
                                    type: string
                                address:
                                    type: string
                                city:
                                    type: string
                                zip:
                                    type: string
                                country:
                                    type: string
                                    description: Country code 2 letters eg. BE/NL/FR
                                l:
                                    type: string
                                    description: Language en/fr/nl/...
            security:
                -   TwikeyToken: []
            parameters:
                - name: Content-Type
                  in: header
                  schema:
                      type: string
                  example: application/x-www-form-urlencoded
            responses:
