openapi: 3.0.0
servers:
    - url: '{{url}}'
      description: Twikey for {{name}}
info:
    title: Twikey API for {{name}}
    description: >-
        # Twikey API

        Version: 1.0.2


        ## General use

        Twikey has put in place a number of services enabling software partners,
        companies with own ERP or CRM systems, banks and other 3rd parties to
        exchange information . This page describes the different calls that are
        available to you. The calls allow integration in a number of ways.


        All exchanges require a valid AuthorizationToken passed as a header named
        "Authorization". The AuthorizationToken can be retrieved via the login call
        and is valid for 24h. Exchanges can respond with both JSON & XML responses
        (based on the "Accept" header).


        Since there are numerous ways a company can allow its customers to pay, we
        provide a couple of high level use-cases to get you up and running in no
        time.


        ## Sample use cases


        ### The fitness scenario


        Imagine you're going to the fitness where you exercise every once in a
        while.

        Since this doesn't come free you pay a monthly subscription fee.

        This subscription fee is a recurring payment (we'll come back to that
        later).

        But since all those exercises get you thirsty, you want to drink there too.

        But of course, there are hotter and colder days. So how much you drink can
        vary.


        Regardless of what you consume, the fitness wants to get paid.

        But you'd like to avoid getting out your wallet when you're all sweaty.

        So your fitness made the great decision to use direct debits to allow you to
        pay.

        At the end of the month they add the recurring amount to the one-off's (the
        drinks).

        They send the payment request to the bank. Everyone's happy and relax.


        What did the fitness do to achieve this relaxed way of working:


        First of all, everything starts with a mandate. When a customer enrolls at
        the fitness he fills in the details for the internal bookkeeping of the
        fitness. The same information is sent to the prepare call.

        This returns a URL (representing an unsigned mandate) that opens up after
        entering all details in the enrollment screen.

        Since the fitness has an internal subscription number they want to use to
        track payments and have

        multiple subscriptions (eg. with and without personal trainer) they add both
        parameters in the prepare call. Making it visible in the mandate overview.


        Once the customer filled in the account info and signed the mandate he's
        sent back to the fitness website with a "thank you" message.

        When a customer ask for a drink at the bar, the cash register calls the
        transaction endpoint with the details and amount. These are one-off
        transactions. Recurring transactions can either be handled the same way or
        if a subscription parameter was added in the prepare call, a recurring
        transaction is automatically added every month to get this subscription
        paid. At the end of each month, the file is created and sent to the bank
        manually via the collect call or automatically every night.

        Your bill is paid and the bank sends you the money. When the bank sends us
        back the account information, it is marked in your transaction overview that
        the transaction was paid. This information can be retrieved by the payment
        call. This call returns all new payment information since the last call. If
        a payment didn't succeed, you can configure what will happen next in the
        interface in the dunning section.


        ### The parking app scenario


        Because my customers don't like running in the rain looking for a parking
        meter while there's an app for that.

        How can I use Twikey to get my parking fees paid? First of all, you need a
        mandate .

        There are three possible options to have this mandate signed:


        Use an in-app browser with the link retrieved via the prepare call

        Use the sign call to invite the user to sign via an sms confirmation

        Use the sign call adding the manual signature as a png-image in the payload

        Once the mandate is signed, in-app purchases can be sent from the backend of
        the app, collected the same way as mentioned in the fitness scenario.


        ### The (off-line) webshop scenario


        I have a shop where people come in physically but I also have a webshop.

        I want people who signed a mandate (either online via the above flow or
        physically) to be able to purchase something

        from the online shop without requiring them to use their credit card and if
        possible give them the sameconvenience in the physical shop.

        This way I can send them an invoice every month by only registering their
        purchases and collecting the payment via direct debit.


        In the past, I had to send out all invoices and patiently waited for them to
        be paid.

        Since I'm not the most patient person on earth and even a bit chaotic at
        times,

        I'd rather collect the money directly from my customers. This way they can't
        forget to pay and I don't need to remind them to do so.

        How convenient this is for both my customers and I.
