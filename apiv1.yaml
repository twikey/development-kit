tags:
    - name: Login
    - name: Mandate
    - name: Subscriptions
    - name: Transactions
    - name: Collections
    - name: Invoices
    - name: Reconciliation
    - name: Paymentlinks
    - name: Credit Transfer
    - name: Issuers
    - name: Customers
    - name: Other
